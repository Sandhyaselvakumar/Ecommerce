<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ecommerce Sync — Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .stat-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .panels {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 14px;
  }
  @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } }
  .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.low { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge.ok { background: rgba(34,197,94,.15); color: var(--accent); }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
  #refresh {
    background: var(--accent); color: #052e16; border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
  <h1>Multichannel Ecommerce Sync — Analytics Dashboard</h1>
  <div class="sub">Live view over the Order &amp; Inventory Sync API &nbsp;·&nbsp; <button id="refresh">Refresh</button></div>

  <div class="grid" id="stat-cards"></div>

  <div class="panels">
    <div class="card">
      <div class="panel-title">Orders & Revenue by Channel</div>
      <canvas id="channelChart" height="180"></canvas>
    </div>
    <div class="card">
      <div class="panel-title">Low Stock Alerts</div>
      <div id="lowStockTable"></div>
    </div>
  </div>

  <div class="panels" style="margin-top:14px;">
    <div class="card">
      <div class="panel-title">Inventory Levels</div>
      <canvas id="inventoryChart" height="180"></canvas>
    </div>
    <div class="card">
      <div class="panel-title">Recent Sync Activity</div>
      <div id="syncTable"></div>
    </div>
  </div>

<script>
let channelChart, inventoryChart;

async function loadData() {
  const res = await fetch('/analytics/summary');
  const data = await res.json();
  renderStats(data.totals);
  renderChannelChart(data.orders_by_channel);
  renderInventoryChart(data.inventory);
  renderLowStock(data.low_stock);
  renderSyncs(data.recent_syncs);
}

function renderStats(totals) {
  const cards = [
    { label: 'Total Orders', value: totals.orders },
    { label: 'Total Revenue', value: '₹' + totals.revenue.toLocaleString('en-IN') },
    { label: 'SKUs Tracked', value: totals.skus_tracked },
    { label: 'Low Stock SKUs', value: totals.low_stock_count },
  ];
  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
    </div>
  `).join('');
}

function renderChannelChart(rows) {
  const ctx = document.getElementById('channelChart');
  const labels = rows.map(r => r.channel);
  const revenue = rows.map(r => r.revenue);
  const orderCounts = rows.map(r => r.order_count);
  if (channelChart) channelChart.destroy();
  channelChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Revenue (₹)', data: revenue, backgroundColor: '#22c55e' },
        { label: 'Orders', data: orderCounts, backgroundColor: '#38bdf8' },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#e2e8f0' } } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
      },
    },
  });
}

function renderInventoryChart(rows) {
  const ctx = document.getElementById('inventoryChart');
  const labels = rows.map(r => r.sku);
  const qty = rows.map(r => r.stock_quantity);
  const colors = rows.map(r => r.stock_quantity <= r.low_stock_threshold ? '#ef4444' : '#22c55e');
  if (inventoryChart) inventoryChart.destroy();
  inventoryChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Stock Qty', data: qty, backgroundColor: colors }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
      },
    },
  });
}

function renderLowStock(rows) {
  const el = document.getElementById('lowStockTable');
  if (!rows.length) { el.innerHTML = '<div class="empty">No low-stock SKUs 🎉</div>'; return; }
  el.innerHTML = `
    <table>
      <thead><tr><th>SKU</th><th>Name</th><th>Qty</th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr><td>${r.sku}</td><td>${r.name}</td><td><span class="badge low">${r.stock_quantity}</span></td></tr>`).join('')}
      </tbody>
    </table>`;
}

function renderSyncs(rows) {
  const el = document.getElementById('syncTable');
  if (!rows.length) { el.innerHTML = '<div class="empty">No sync activity yet</div>'; return; }
  el.innerHTML = `
    <table>
      <thead><tr><th>Channel</th><th>SKU</th><th>Change</th><th>Reason</th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${r.channel}</td>
          <td>${r.sku}</td>
          <td>${r.previous_qty} → ${r.new_qty}</td>
          <td>${r.reason}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

document.getElementById('refresh').addEventListener('click', loadData);
loadData();
</script>
</body>
</html>
